name: ticket_potosi
description: "TicketPotosí - Tu plataforma de eventos en Potosí, Bolivia"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP y almacenamiento
  http: ^1.2.0
  shared_preferences: ^2.2.2

  # Estado y navegación
  provider: ^6.1.2

  # QR - Generación y escaneo
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # Imágenes y archivos
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  path_provider: ^2.1.2

  # PDF e impresión
  pdf: ^3.10.8
  printing: ^5.12.0

  # Gráficos para dashboard
  fl_chart: ^0.68.0

  # Internacionalización y fechas
  intl: ^0.19.0

  # Animaciones
  flutter_animate: ^4.5.0

  # Permisos
  permission_handler: ^11.3.1

  # Video
  video_player: ^2.8.3

  # URL launcher
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
